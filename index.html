<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>One in a Million | Best Burgers in Jabalpur</title>

    <!-- ── Primary SEO (base/fallback — react-helmet-async overrides per page) ── -->
    <meta name="description" content="Order the best burgers in Jabalpur — customize, track, enjoy. Fresh-made patties, bold Indian spices, lightning-fast delivery." />
    <meta name="theme-color" content="#B08850" />
    <link rel="canonical" href="https://oneinamillion.com/" />

    <!-- ── Open Graph (base fallback) ──────────────────────────────────── -->
    <meta property="og:type"        content="website" />
    <meta property="og:site_name"   content="One in a Million" />
    <meta property="og:title"       content="One in a Million | Best Burgers in Jabalpur" />
    <meta property="og:description" content="Order the best burgers in Jabalpur — customize, track, enjoy." />
    <meta property="og:url"         content="https://oneinamillion.com/" />
    <meta property="og:image"       content="https://res.cloudinary.com/dsjxrospe/image/upload/f_auto,q_auto,w_1200,h_630,c_fill/one%20in%20a%20million/images/million-classic" />
    <meta property="og:image:width"  content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale"      content="en_IN" />

    <!-- ── Twitter Card ─────────────────────────────────────────────────── -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:title"       content="One in a Million | Best Burgers in Jabalpur" />
    <meta name="twitter:description" content="Order the best burgers in Jabalpur — customize, track, enjoy." />
    <meta name="twitter:image"       content="https://res.cloudinary.com/dsjxrospe/image/upload/f_auto,q_auto,w_1200,h_630,c_fill/one%20in%20a%20million/images/million-classic" />

    <!-- ── PWA meta ──────────────────────────────────────────────────────── -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="OneInAMillion" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.svg" />
    <!-- manifest.webmanifest is injected automatically by vite-plugin-pwa -->

    <!-- ── Performance: DNS prefetch & preconnect ────────────────────────
         Lighthouse penalises render-blocking third-party origins.
         preconnect opens the TCP+TLS handshake before the browser needs it. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://res.cloudinary.com" crossorigin />
    <link rel="dns-prefetch" href="https://api.cloudinary.com" />

    <!-- ── Fonts — display=swap prevents invisible text (FOIT) ──────────── -->
    <link
      href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Inter:wght@400;500;600;700;800;900&family=Anton&display=swap"
      rel="stylesheet"
    />

    <!-- ── Critical hero image preload (LCP optimisation) ───────────────
         The hero burger image is the Largest Contentful Paint element.
         Preloading it removes a render-blocking waterfall request.
         imagesrcset uses srcset syntax; browser picks the right size. -->
    <link
      rel="preload"
      as="image"
      href="https://res.cloudinary.com/dsjxrospe/image/upload/f_auto,q_auto,w_800/one%20in%20a%20million/images/million-classic"
      imagesrcset="
        https://res.cloudinary.com/dsjxrospe/image/upload/f_auto,q_auto,w_400/one%20in%20a%20million/images/million-classic 400w,
        https://res.cloudinary.com/dsjxrospe/image/upload/f_auto,q_auto,w_800/one%20in%20a%20million/images/million-classic 800w,
        https://res.cloudinary.com/dsjxrospe/image/upload/f_auto,q_auto,w_1200/one%20in%20a%20million/images/million-classic 1200w
      "
      imagesizes="(max-width: 768px) 100vw, 50vw"
      fetchpriority="high"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
